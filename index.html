<!DOCTYPE html>
<html>
<head>
<title>Hacked System</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

#matrix {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

#terminal {
  padding: 20px;
}

.glitch {
  font-size: 30px;
  position: relative;
  color: #0f0;
  animation: glitch 1s infinite;
}

@keyframes glitch {
  0% { text-shadow: 2px 0 red; }
  50% { text-shadow: -2px 0 blue; }
  100% { text-shadow: 2px 0 red; }
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #0f0;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,50%,100% { opacity: 1; }
  25%,75% { opacity: 0; }
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="terminal">
  <div class="glitch">ACCESS GRANTED</div>
  <p id="typing"></p>
  <span class="cursor"></span>
</div>

<audio id="sound" autoplay loop>
  <source src="https://www.soundjay.com/button/beep-07.wav">
</audio>

<script>
// Matrix Effect
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = [];

for (let x = 0; x < columns; x++)
  drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#0f0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}
setInterval(draw, 33);

// Typing Effect
let text = "Welcome to the system...\nTracking IP...\nAccessing data...\nComplete.";
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 50);
  }
}
typeWriter();
</script>

</body>
</html>
