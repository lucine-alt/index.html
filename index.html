<!DOCTYPE html>
<html>
<head>
<title>Shan State</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: url('https://upload.wikimedia.org/wikipedia/commons/3/3c/Inle_Lake_Myanmar.jpg') no-repeat center center;
  background-size: cover;
  font-family: monospace;
  color: #00ff00;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* DARK OVERLAY */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  top: 0;
  left: 0;
}

/* CENTER BOX */
#box {
  position: relative;
  text-align: center;
  padding: 25px;
  border: 1px solid #0f0;
  box-shadow: 0 0 30px #0f0;
  background: rgba(0,0,0,0.7);
  width: 90%;
  max-width: 400px;
}

/* TEXT */
h2 {
  font-size: 26px;
  text-shadow: 0 0 10px #0f0;
}

p {
  font-size: 16px;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 15px;
  background: black;
  color: #0f0;
  border: 2px solid #0f0;
  padding: 12px;
  font-size: 16px;
}

/* OUTPUT */
#output {
  margin-top: 15px;
}
</style>

</head>

<body>

<div id="box">
  <h2>ရှမ်းပြည်နယ်ရဲ့အလှ 🌄</h2>
  <p>Inle Lake • Taunggyi • Kalaw</p>

  <button onclick="start()">START SYSTEM</button>

  <div id="output"></div>
</div>

<script>
function start() {
  let text = "Welcome to Shan State...\nLoading...\nSystem Ready ✔";
  let i = 0;
  let out = document.getElementById("output");

  function type() {
    if (i < text.length) {
      out.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 50);
    }
  }
  type();
}
</script>

</body>
</html>
