<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Azenx Prince</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(45deg, #6a11cb, #2575fc);
  background-size: 300% 300%;
  animation: bg 6s infinite;
  color: white;
  text-align: center;
}

@keyframes bg {
  0% {background-position: 0%;}
  100% {background-position: 100%;}
}

.container {
  margin-top: 50px;
}

img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  box-shadow: 0 0 20px cyan;
}

h1 {
  text-shadow: 0 0 10px cyan;
}

button {
  width: 80%;
  padding: 15px;
  margin: 10px;
  border: none;
  border-radius: 30px;
  font-size: 18px;
  color: white;
  background: linear-gradient(45deg, pink, purple);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ff00ff;
}

#typing {
  margin: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
  <img src="https://i.imgur.com/yourphoto.jpg">
  <h1>Azenx Prince</h1>
  <p id="typing"></p>

  <button onclick="go('https://facebook.com')">Facebook</button>
  <button onclick="go('https://tiktok.com')">TikTok</button>
  <button onclick="go('https://youtube.com')">YouTube</button>
</div>

<!-- typing effect -->
<script>
let text = "Welcome to my world 🌍🔥";
let i = 0;
function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 50);
  }
}
type();

function go(link){
  window.location.href = link;
}
</script>

<!-- music -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

</body>
</html>
