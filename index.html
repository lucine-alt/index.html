<!DOCTYPE html>
<html>
<head>
<title>Shan State</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: monospace;
  color: #00ff00;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* BACKGROUND IMAGE */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  animation: zoom 10s infinite alternate;
  z-index: -2;
}

/* DARK OVERLAY */
#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

/* BOX */
#box {
  text-align: center;
  padding: 25px;
  border: 1px solid #0f0;
  box-shadow: 0 0 30px #0f0;
  background: rgba(0,0,0,0.7);
  width: 90%;
  max-width: 400px;
}

/* TEXT */
h2 {
  font-size: 26px;
  text-shadow: 0 0 10px #0f0;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 15px;
  background: black;
  color: #0f0;
  border: 2px solid #0f0;
  padding: 12px;
}

/* OUTPUT */
#output {
  margin-top: 15px;
}

/* ZOOM EFFECT */
@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}
</style>

</head>

<body>

<div id="bg"></div>
<div id="overlay"></div>

<div id="box">
  <h2>ရှမ်းပြည်နယ် 🌄</h2>
  <p>Inle • Taunggyi • Kalaw</p>

  <button onclick="start()">START SYSTEM</button>

  <div id="output"></div>
</div>

<script>

/* SLIDESHOW IMAGES */
let images = [
  "https://upload.wikimedia.org/wikipedia/commons/3/3c/Inle_Lake_Myanmar.jpg",
  "https://upload.wikimedia.org/wikipedia/commons/0/0e/Taunggyi.jpg",
  "https://upload.wikimedia.org/wikipedia/commons/5/57/Kalaw.jpg"
];

let i = 0;
let bg = document.getElementById("bg");

/* CHANGE IMAGE EVERY 4s */
function changeBg() {
  bg.style.backgroundImage = "url('" + images[i] + "')";
  i = (i + 1) % images.length;
}
setInterval(changeBg, 4000);
changeBg();

/* HACKER TEXT */
function start() {
  let text = "Access Granted...\nLoading Shan Data...\nEnjoy Nature 🌄";
  let i = 0;
  let out = document.getElementById("output");

  function type() {
    if (i < text.length) {
      out.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 40);
    }
  }
  type();
}

</script>

</body>
</html>
