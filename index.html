<!DOCTYPE html>
<html>
<head>
<title>System Terminal</title>
<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
}

#terminal {
  padding: 20px;
  white-space: pre-line;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { background: transparent; }
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>
var text = [
"> Initializing system...",
"> Connecting to secure server...",
"> Bypassing firewall...",
"> Injecting payload...",
"> Accessing database...",
"> Downloading files...",
"> Decrypting passwords...",
"> WARNING: TRACE DETECTED ⚠️",
"> Bypassing trace...",
"> ACCESS GRANTED 😈",
"> Welcome, Admin."
];

var i = 0;
var speed = 40;
var terminal = document.getElementById("terminal");

function typeLine() {
  if (i < text.length) {
    var line = text[i];
    var charIndex = 0;
    var currentLine = document.createElement("div");
    terminal.appendChild(currentLine);

    function typeChar() {
      if (charIndex < line.length) {
        currentLine.innerHTML += line.charAt(charIndex);
        charIndex++;
        setTimeout(typeChar, speed);
      } else {
        i++;
        setTimeout(typeLine, 500);
      }
    }

    typeChar();
  }
}

typeLine();
</script>

</body>
</html>
