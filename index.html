<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Azenx Prince</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #000000, #1a1a1a);
  color:white;
  text-align:center;
}

/* Profile */
.profile {
  margin-top:60px;
}

.profile img {
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #00ffcc;
  box-shadow:0 0 20px #00ffcc;
}

h1 {
  margin:10px;
  font-size:28px;
}

.bio {
  color:#aaa;
}

/* Buttons */
.btn {
  display:block;
  width:80%;
  margin:15px auto;
  padding:15px;
  border-radius:30px;
  font-size:18px;
  color:white;
  text-decoration:none;
  background: linear-gradient(45deg,#ff00cc,#3333ff);
  box-shadow:0 0 15px #ff00cc;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.05);
}

/* Start Button */
.start {
  background:black;
  border:1px solid #00ff00;
  color:#00ff00;
  box-shadow:0 0 15px #00ff00;
}
</style>

</head>

<body>

<div class="profile">

<img src="https://i.ibb.co/0jQz0hF/profile.jpg">

<h1>Azenx Prince</h1>
<p class="bio">Welcome to my world 🌍🔥</p>

</div>

<!-- START -->
<button class="btn start" onclick="start()">▶ Enter</button>

<!-- LINKS -->
<div id="links" style="display:none;">

<a class="btn" href="https://www.facebook.com/azenxprince?mibextid=ZbWKwL">Facebook</a>

<a class="btn" href="https://tiktok.com/@azenxprince">TikTok</a>

<a class="btn" href="https://www.youtube.com/@lunaprincezenx">YouTube</a>

</div>

<!-- MUSIC -->
<audio id="music">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
function start(){
  document.getElementById("music").play();
  document.getElementById("links").style.display="block";
}
</script>

</body>
</html>
