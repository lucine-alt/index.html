<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Azenx System</title>

<style>
body {
  margin:0;
  background:black;
  color:#00ff00;
  font-family: monospace;
  text-align:center;
}

/* Glow Box */
.box {
  margin-top:80px;
  padding:20px;
  border:1px solid #00ff00;
  box-shadow:0 0 20px #00ff00;
}

/* Button */
button {
  background:black;
  color:#00ff00;
  border:1px solid #00ff00;
  padding:15px;
  width:80%;
  margin:10px;
  font-size:18px;
}

button:hover {
  background:#00ff00;
  color:black;
}

/* Matrix text */
#text {
  margin:20px;
}
</style>

</head>

<body>

<div class="box">

<h2 id="text"></h2>

<!-- START -->
<button onclick="startSystem()">▶ START SYSTEM</button>

<!-- Links -->
<div id="links" style="display:none;">

<button onclick="go('https://www.facebook.com/azenxprince?mibextid=ZbWKwL')">Facebook</button>

<button onclick="go('https://tiktok.com/@azenxprince')">TikTok</button>

<button onclick="go('https://www.youtube.com/@lunaprincezenx')">YouTube</button>

</div>

</div>

<!-- SOUND -->
<audio id="music">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<audio id="beep">
  <source src="https://www.soundjay.com/button/sounds/button-16.mp3">
</audio>

<script>

let msg = "ACCESS GRANTED... WELCOME AZENX PRINCE";
let i = 0;

function type(){
  if(i < msg.length){
    document.getElementById("text").innerHTML += msg.charAt(i);
    i++;
    setTimeout(type,50);
  }
}

function startSystem(){
  document.getElementById("beep").play(); // beep sound
  document.getElementById("music").play(); // music start
  type();

  setTimeout(()=>{
    document.getElementById("links").style.display="block";
  },2000);
}

function go(link){
  document.getElementById("beep").play();
  window.location.href = link;
}

</script>

</body>
</html>
