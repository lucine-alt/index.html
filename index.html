<!DOCTYPE html>
<html>
<head>
<title>Hacked System</title>

<style>
body {
  margin:0;
  background:black;
  color:#0f0;
  font-family:monospace;
  overflow:hidden;
}

/* Desktop */
#desktop {
  display:none;
  width:100%;
  height:100vh;
  background:black;
}

/* Icons */
.icon {
  width:80px;
  text-align:center;
  margin:20px;
  cursor:pointer;
}

/* Terminal window */
#terminalWindow {
  display:none;
  position:absolute;
  top:100px;
  left:50px;
  width:80%;
  height:60%;
  background:black;
  border:1px solid #0f0;
  padding:10px;
  overflow:auto;
}

/* Login */
#login {
  text-align:center;
  margin-top:150px;
}

input {
  background:black;
  border:1px solid #0f0;
  color:#0f0;
  padding:5px;
}

/* Matrix canvas */
canvas {
  position:fixed;
  top:0;
  left:0;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="login">
<h1>SYSTEM LOCKED</h1>
<p>Enter Root Password:</p>
<input type="password" id="pass" onkeydown="login(event)">
</div>

<div id="desktop">

<div class="icon" onclick="openTerminal()">💻<br>Terminal</div>

<div id="terminalWindow"></div>

</div>

<script>
// MATRIX EFFECT
var c=document.getElementById("matrix");
var ctx=c.getContext("2d");
c.height=window.innerHeight;
c.width=window.innerWidth;

var letters="01".split("");
var font_size=14;
var columns=c.width/font_size;
var drops=[];

for(var x=0;x<columns;x++) drops[x]=1;

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#0f0";
  ctx.font=font_size+"px monospace";

  for(var i=0;i<drops.length;i++){
    var text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*font_size,drops[i]*font_size);
    if(drops[i]*font_size>c.height && Math.random()>0.975)
      drops[i]=0;
    drops[i]++;
  }
}
setInterval(draw,33);

// LOGIN
function login(e){
  if(e.key==="Enter"){
    var pass=document.getElementById("pass").value;
    if(pass==="root"){
      document.getElementById("login").style.display="none";
      document.getElementById("desktop").style.display="block";
    } else {
      alert("ACCESS DENIED ❌");
    }
  }
}

// TERMINAL
function openTerminal(){
  var term=document.getElementById("terminalWindow");
  term.style.display="block";

  term.innerHTML="> Booting system...<br>";

  var lines=[
    "> Connecting...",
    "> Injecting exploit...",
    "> Accessing files...",
    "> SUCCESS 😈"
  ];

  var i=0;
  function next(){
    if(i<lines.length){
      term.innerHTML+=lines[i]+"<br>";
      i++;
      setTimeout(next,800);
    }
  }
  next();
}
</script>

</body>
</html>
