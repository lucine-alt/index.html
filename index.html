<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Azenx Prince</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(45deg, #6a11cb, #2575fc);
  background-size: 300% 300%;
  animation: bg 6s infinite alternate;
  color: white;
  text-align: center;
}

@keyframes bg {
  0% {background-position: left;}
  100% {background-position: right;}
}

.container {
  margin-top: 50px;
}

img {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  box-shadow: 0 0 25px cyan;
}

h1 {
  margin: 10px;
  font-size: 32px;
  text-shadow: 0 0 10px cyan;
}

#typing {
  margin: 10px;
  font-size: 18px;
  color: #eee;
}

button {
  width: 80%;
  padding: 15px;
  margin: 10px;
  border: none;
  border-radius: 30px;
  font-size: 18px;
  color: white;
  background: linear-gradient(45deg, #ff00cc, #3333ff);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ff00ff;
}
</style>

</head>

<body>

<div class="container">

  <!-- Profile Image -->
  <img src="https://i.ibb.co/0jQz0hF/profile.jpg">

  <h1>Azenx Prince</h1>

  <p id="typing"></p>

  <!-- Buttons -->
  <button onclick="go('https://www.facebook.com/azenxprince?mibextid=ZbWKwL')">Facebook</button>

  <button onclick="go('https://tiktok.com/@azenxprince')">TikTok</button>

  <button onclick="go('https://www.youtube.com/@lunaprincezenx')">YouTube</button>

</div>

<!-- Typing Effect -->
<script>
let text = "Welcome to my world 🌍🔥";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 50);
  }
}
type();

function go(link){
  window.location.href = link;
}
</script>

<!-- Music -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

</body>
</html>
