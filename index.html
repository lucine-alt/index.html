<button onclick="copyText()">COPY</button>

<p id="text">Shan State is beautiful 🌄</p>

<script>
function copyText() {
  let text = document.getElementById("text").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>
